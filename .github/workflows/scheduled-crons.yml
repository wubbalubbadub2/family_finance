# External scheduler for prod cron jobs.
#
# Why this exists (2026-05-16): Vercel Hobby cron scheduler became unreliable —
# stopped firing all 4 of our cron routes for 24+ hours without any error
# or notification. Routes themselves are healthy (manual curls succeed).
# We're moving the SCHEDULING off Vercel; the routes still run on Vercel
# (Next.js serverless functions), GitHub Actions just fires them on time.
#
# 2026-05-17 update: day1-nudge moved further off Vercel — the send loop
# now runs INSIDE the GH Actions runner via scripts/cron-runners/day1-nudge.mjs.
# Vercel only provides /candidates (read) and /mark (per-family write) endpoints.
# This removes Vercel's 60s function timeout from the critical path, which
# became a problem when audience grew past ~200 families.
#
# Routes that still run end-to-end on Vercel (one curl each):
#   /api/cron/weekly-digest
#   /api/cron/cleanup
#   /api/cron/monthly
#
# Routes split between Vercel + GH Actions:
#   /api/cron/day1-nudge   →   Node runner here calls /candidates + /mark
#
# Required secrets (set via `gh secret set`):
#   CRON_SECRET_PROD       — must match process.env.CRON_SECRET on Vercel prod
#   TELEGRAM_BOT_TOKEN_PROD — prod bot token (only needed for day1-nudge)
#
# Manual trigger for testing:
#   gh workflow run scheduled-crons.yml -f route=/api/cron/day1-nudge
#   gh workflow run scheduled-crons.yml -f route=/api/cron/day1-nudge -f dry_run=true
#   OR via the Actions tab → "Scheduled Crons" → Run workflow
#
# Notes:
#   - GitHub Actions cron has its own delay (typically 0-15 min during high
#     load). Acceptable for our once-daily/weekly schedules.
#   - Scheduled workflows only run from the DEFAULT branch (main).
#   - 5-minute job timeout — long enough for any cron, short enough that a
#     hung run doesn't burn workflow minutes.

name: Scheduled Crons

on:
  schedule:
    - cron: '0 16 * * *'   # day1-nudge: daily 21:00 Almaty
    - cron: '0 15 * * 0'   # weekly-digest: Sunday 20:00 Almaty
    - cron: '0 3 * * 0'    # cleanup: Sunday 08:00 Almaty
    - cron: '0 5 1 * *'    # monthly: 1st of month, 10:00 Almaty
  workflow_dispatch:
    inputs:
      route:
        description: 'Route to fire manually'
        required: true
        type: choice
        options:
          - /api/cron/day1-nudge
          - /api/cron/weekly-digest
          - /api/cron/cleanup
          - /api/cron/monthly
      dry_run:
        description: 'Dry-run (day1-nudge only): fetch candidates + simulate sends, no DB writes, no Telegram messages'
        required: false
        type: boolean
        default: false

jobs:
  fire-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine route from schedule (or input)
        id: which
        run: |
          if [ -n "${{ inputs.route }}" ]; then
            echo "route=${{ inputs.route }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 16 * * *") echo "route=/api/cron/day1-nudge" >> "$GITHUB_OUTPUT" ;;
              "0 15 * * 0") echo "route=/api/cron/weekly-digest" >> "$GITHUB_OUTPUT" ;;
              "0 3 * * 0")  echo "route=/api/cron/cleanup" >> "$GITHUB_OUTPUT" ;;
              "0 5 1 * *")  echo "route=/api/cron/monthly" >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::error::Unknown cron schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          fi

      # day1-nudge needs the repo checked out so we can run the Node runner.
      # Other routes are pure curl — no checkout needed.
      - name: Checkout (day1-nudge only)
        if: steps.which.outputs.route == '/api/cron/day1-nudge'
        uses: actions/checkout@v4

      - name: Fire day1-nudge via Node runner
        if: steps.which.outputs.route == '/api/cron/day1-nudge'
        env:
          PROD_URL: https://family-finance-taupe.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET_PROD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CONCURRENCY: '10'
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET_PROD secret is not set in this repo"
            exit 1
          fi
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN_PROD secret is not set in this repo"
            exit 1
          fi
          node scripts/cron-runners/day1-nudge.mjs

      - name: Fire cron route via curl (non-day1-nudge)
        if: steps.which.outputs.route != '/api/cron/day1-nudge'
        env:
          ROUTE: ${{ steps.which.outputs.route }}
          PROD_URL: https://family-finance-taupe.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET_PROD }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET_PROD secret is not set in this repo"
            exit 1
          fi
          echo "→ POST $PROD_URL$ROUTE"
          # 5-minute curl timeout; Vercel function caps at 60s on Hobby so
          # this is mostly defensive.
          HTTP_CODE=$(curl -sS -m 300 -o /tmp/cron-body -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" "$PROD_URL$ROUTE")
          echo "← HTTP $HTTP_CODE"
          echo "Response:"
          cat /tmp/cron-body
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cron $ROUTE failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✓ $ROUTE fired successfully"
